<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>
    
    <!-- Neon Green Glow Gradient -->
    <linearGradient id="neon-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>

    <!-- Metallic Shield Gradient -->
    <linearGradient id="shield-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#475569"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    
    <!-- Lens Reflection Gradient -->
    <linearGradient id="lens-reflect" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#0284c7" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#0369a1" stop-opacity="0"/>
    </linearGradient>
    
    <!-- Drop Shadow Filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    
    <!-- Neon Glow Filter -->
    <filter id="glow-filter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Base Squircle Background -->
  <rect width="512" height="512" rx="128" fill="url(#bg-grad)"/>

  <!-- Outer Neon Shield Border -->
  <path d="M 256,64 
           C 340,64 390,96 416,128 
           C 416,240 376,360 256,448 
           C 136,360 96,240 96,128 
           C 122,96 172,64 256,64 Z" 
        fill="none" 
        stroke="url(#neon-glow)" 
        stroke-width="12" 
        filter="url(#glow-filter)"
        stroke-linejoin="round"/>

  <!-- Inner Metallic Shield -->
  <path d="M 256,84 
           C 324,84 366,110 388,136 
           C 388,228 354,328 256,408 
           C 158,328 124,228 124,136 
           C 146,110 188,84 256,84 Z" 
        fill="url(#shield-grad)" 
        filter="url(#shadow)"/>

  <!-- Camera Body Outer Ring -->
  <circle cx="256" cy="236" r="80" fill="#0f172a" stroke="#64748b" stroke-width="4"/>

  <!-- Camera Lens Glass -->
  <circle cx="256" cy="236" r="64" fill="#020617"/>
  
  <!-- Camera Lens Inner Reflection -->
  <circle cx="256" cy="236" r="50" fill="url(#lens-reflect)"/>
  
  <!-- Camera Lens Aperture Element -->
  <circle cx="256" cy="236" r="24" fill="#0f172a"/>
  <circle cx="250" cy="230" r="8" fill="#38bdf8" opacity="0.8"/>

  <!-- Glowing LED Indicator (Active Monitoring) -->
  <!-- Pulse Green LED -->
  <circle cx="256" cy="120" r="10" fill="#22c55e" filter="url(#glow-filter)"/>
  <circle cx="256" cy="120" r="5" fill="#ffffff"/>

  <!-- Grid/Scanner overlay lines (AI tracking representation) -->
  <path d="M 180,236 L 160,236" stroke="#22c55e" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <path d="M 332,236 L 352,236" stroke="#22c55e" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <path d="M 256,300 L 256,320" stroke="#22c55e" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  
  <!-- Label "iSpy" -->
  <text x="256" y="475" 
        font-family="'Inter', -apple-system, BlinkMacSystemFont, sans-serif" 
        font-weight="900" 
        font-size="42" 
        fill="#ffffff" 
        text-anchor="middle" 
        letter-spacing="4">
    ISPY AI
  </text>
</svg>
